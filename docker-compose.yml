services:
    sio_test:
        user: app
        build:
            context: .
            args:
                USER_ID: ${USER_ID:-1000}
        ports:
            - "8337:8337"
        volumes:
            - .:/app:rw
        environment:
            - APP_ENV=dev
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - default

    postgres:
        image: postgres:18-alpine
        environment:
            POSTGRES_DB: ${DB_NAME:-app}
            POSTGRES_USER: ${DB_USER:-app}
            POSTGRES_PASSWORD: ${DB_PASS:-app}
#        volumes:
#            - pgdata:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-app}"]
            interval: 5s
            timeout: 3s
            retries: 10
        ports:
            - "5454:5432"
        networks:
            - default

networks:
    default:

